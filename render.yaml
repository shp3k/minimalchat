services:
  - type: web
    name: minimalchat-server
    runtime: node
    plan: free
    buildCommand: npm install && npm run db:generate && npm run build -w @minimalchat/shared && npm run build -w apps/server && npm run db:push -w apps/server
    startCommand: npm run start -w apps/server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CLIENT_ORIGIN
        value: "*"
      - key: SUPABASE_STORAGE_BUCKET
        value: minimalchat-uploads
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
